<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0d0d12" />
<title>N3Slot 小役カウンター</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1 class="topbar__title">N3Slot 小役カウンター</h1>
      <button class="btn btn--reset" id="resetBtn" aria-label="すべてリセット">リセット</button>
    </header>

    <main class="board" id="board"></main>

    <section class="spinbar">
      <button class="spinbar__minus" data-spin="-1" aria-label="回転数を1減らす">−1</button>

      <div class="spinbar__display">
        <span class="spinbar__label">回転数</span>
        <span class="spinbar__value" id="spinCount">0</span>
      </div>

      <button class="spinbar__plus" data-spin="1" aria-label="回転数を1増やす">
        +1<span class="spinbar__plus-sub">タップ</span>
      </button>

      <button class="spinbar__plus10" data-spin="10" aria-label="回転数を10増やす">+10</button>
    </section>
  </div>

  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <p>すべてのカウントをリセットしますか？</p>
      <div class="confirm-box__actions">
        <button class="btn" id="cancelReset">キャンセル</button>
        <button class="btn btn--danger" id="okReset">リセットする</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
