<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0d0d12" />
<title>小役カウンター</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="rotate-hint">
    <div class="rotate-hint__icon">📱↻</div>
    <div>横向きにしてご利用ください</div>
  </div>

  <div class="app">
    <header class="topbar">
      <h1 class="topbar__title">小役カウンター</h1>

      <div class="spins">
        <span class="spins__label">回転数</span>
        <button class="btn btn--minus" data-spin="-1" aria-label="回転数を1減らす">−1</button>
        <span class="spins__value" id="spinCount">0</span>
        <button class="btn btn--plus" data-spin="1" aria-label="回転数を1増やす">+1</button>
        <button class="btn btn--plus btn--big" data-spin="10" aria-label="回転数を10増やす">+10</button>
      </div>

      <button class="btn btn--reset" id="resetBtn" aria-label="すべてリセット">リセット</button>
    </header>

    <main class="board" id="board"></main>
  </div>

  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <p>すべてのカウントをリセットしますか？</p>
      <div class="confirm-box__actions">
        <button class="btn" id="cancelReset">キャンセル</button>
        <button class="btn btn--danger" id="okReset">リセットする</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
